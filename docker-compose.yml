services:
  app:
    build:
      context: ..
      dockerfile: dialup_site/Dockerfile
    ports:
      - "4001:4001"
    environment:
      - PORT=4001
      - MIX_ENV=prod
    restart: unless-stopped

  cloudflared:
    image: cloudflare/cloudflared:latest
    command: tunnel --no-autoupdate run --token ${CLOUDFLARE_TUNNEL_TOKEN}
    restart: unless-stopped
    depends_on:
      - app
